name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Compile Swift binary
        run: |
          swiftc -O \
            -framework ScreenCaptureKit \
            -framework CoreMedia \
            -framework AVFAudio \
            -framework AudioToolbox \
            AudioCapture.swift -o AudioCapture

      - name: Check if version already released
        id: version_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          if gh release view "v$VERSION" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "v$VERSION already released — skipping publish"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "v$VERSION is new — will publish"
          fi

      - name: Build & publish
        if: steps.version_check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish always
