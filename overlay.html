<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #drag-bar {
      height: 28px;
      width: 100%;
      -webkit-app-region: drag;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    #drag-bar .dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
    }

    body:hover #drag-bar { opacity: 1; }

    #card {
      background: rgba(8, 8, 18, 0.95);
      border: 1px solid rgba(99, 102, 241, 0.55);
      border-radius: 14px;
      padding: 16px 18px 18px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.75);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      position: relative;
      flex: 1;
      overflow-y: auto;
    }

    #card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #question-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(165, 180, 252, 0.75);
      margin-bottom: 6px;
    }

    #question {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
      margin-bottom: 12px;
      font-style: italic;
    }

    #answer-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(165, 180, 252, 0.75);
      margin-bottom: 7px;
    }

    #answer {
      font-size: 15px;
      color: #f1f5f9;
      line-height: 1.7;
      font-weight: 400;
    }

    #dismiss {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
      transition: background 0.15s;
    }

    #dismiss:hover {
      background: rgba(255,255,255,0.22);
      color: #fff;
    }

    #test-mode {
      display: none;
      text-align: center;
      padding: 20px 16px;
      color: rgba(165,180,252,0.7);
      font-size: 13px;
      line-height: 1.7;
      flex: 1;
    }

    #test-mode.visible { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="drag-bar">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div id="test-mode" class="visible">
    <div style="font-size:12px;font-weight:700;color:#a5b4fc;margin-bottom:8px;letter-spacing:0.5px">OVERLAY POSITION</div>
    Drag this window to where you want<br>coaching cards to appear.<br>
    <div style="margin-top:10px;font-size:11px;opacity:0.5">You can also resize from any edge.<br>Position is saved automatically.</div>
  </div>

  <div id="card">
    <button id="dismiss" onclick="dismissCard()">✕</button>
    <div id="question-label">Question</div>
    <div id="question"></div>
    <div id="answer-label">Say This</div>
    <div id="answer"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    let _dismissTimer = null;

    ipcRenderer.on('overlay-coaching', (event, data) => {
      document.getElementById('test-mode').classList.remove('visible');
      document.getElementById('question').textContent = data.question || '';
      document.getElementById('answer').textContent = data.answer || '';
      const card = document.getElementById('card');
      card.classList.remove('visible');
      void card.offsetWidth; // force reflow
      card.classList.add('visible');

      // Auto-dismiss after 45s
      if (_dismissTimer) clearTimeout(_dismissTimer);
      _dismissTimer = setTimeout(dismissCard, 45000);
    });

    ipcRenderer.on('overlay-test-mode', () => {
      document.getElementById('test-mode').classList.add('visible');
      document.getElementById('card').classList.remove('visible');
    });

    ipcRenderer.on('overlay-dismiss', () => dismissCard());

    function dismissCard() {
      if (_dismissTimer) { clearTimeout(_dismissTimer); _dismissTimer = null; }
      document.getElementById('card').classList.remove('visible');
    }

    // Keyboard: Escape to dismiss
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') dismissCard();
    });
  </script>
</body>
</html>
