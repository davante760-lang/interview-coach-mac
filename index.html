<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  padding: 20px;
  -webkit-app-region: drag;
  user-select: none;
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-top: 8px;
}
.logo  { color: #f43f5e; font-size: 20px; }
.title { font-size: 15px; font-weight: 700; }
.subtitle { font-size: 11px; color: #64748b; }

.status {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: #1e293b;
  border-radius: 10px;
  font-size: 13px;
}
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot-idle { background: #64748b; }
.dot-live { background: #10b981; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

input.field {
  width: 100%;
  padding: 9px 12px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 8px;
  color: #e2e8f0;
  font-size: 12px;
  font-family: inherit;
  -webkit-app-region: no-drag;
}
input.field:focus { outline: none; border-color: #3b82f6; }
input.field::placeholder { color: #475569; }

.row { display: flex; gap: 8px; }
.row .field { flex: 1; }

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  -webkit-app-region: no-drag;
  transition: background .15s;
}
.btn-start { background: #f43f5e; color: white; }
.btn-start:hover { background: #e11d48; }
.btn-stop  { background: #1e293b; color: #ef4444; border: 1px solid #ef4444; }
.btn-stop:hover { background: rgba(127,29,29,.2); }

/* Stats grid */
.stats {
  background: #1e293b;
  border-radius: 10px;
  padding: 10px 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 12px;
  font-size: 11px;
}
.stat-label { color: #475569; }
.stat-value { color: #94a3b8; font-variant-numeric: tabular-nums; }

.error-msg {
  background: rgba(239,68,68,.1);
  border: 1px solid rgba(239,68,68,.3);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 11px;
  color: #fca5a5;
  white-space: pre-wrap;
  line-height: 1.5;
  -webkit-app-region: no-drag;
  user-select: text;
}

.transcripts {
  flex: 1;
  min-height: 80px;
  background: #1e293b;
  border-radius: 10px;
  padding: 10px 14px;
  overflow-y: auto;
  font-size: 12px;
  line-height: 1.6;
  -webkit-app-region: no-drag;
  user-select: text;
}
.transcripts-header {
  font-size: 11px;
  color: #475569;
  font-weight: 600;
  margin-bottom: 6px;
}
.transcript-line {
  color: #cbd5e1;
  margin-bottom: 4px;
  padding: 4px 8px;
  background: rgba(255,255,255,.03);
  border-radius: 6px;
}
.transcript-line.candidate {
  color: #60a5fa;
  border-left: 2px solid #3b82f6;
}
.transcript-line.interim {
  color: #64748b;
  font-style: italic;
}
.transcript-empty {
  color: #334155;
  font-style: italic;
  font-size: 11px;
}

.info {
  font-size: 10px;
  color: #334155;
  text-align: center;
  line-height: 1.6;
  flex-shrink: 0;
}
</style>
</head>
<body>

  <div class="header">
    <span class="logo">◆</span>
    <div>
      <div class="title">Interview Coach</div>
      <div class="subtitle">System Audio Capture</div>
    </div>
  </div>

  <div class="status">
    <div class="dot dot-idle" id="dot"></div>
    <span id="status-text">Ready</span>
  </div>

  <input class="field" id="server-url" type="text"
    value="wss://interview-coach-production-9c63.up.railway.app"
    placeholder="Server WebSocket URL">

  <div class="row">
    <input class="field" id="prospect-name"    type="text" placeholder="Prospect name (optional)">
    <input class="field" id="prospect-company" type="text" placeholder="Company (optional)">
  </div>

  <button class="btn btn-start" id="btn-start" onclick="startCapture()">
    🎙 Start Capturing Audio
  </button>
  <button class="btn btn-stop" id="btn-stop" onclick="stopCapture()" style="display:none">
    ■ Stop
  </button>

  <div class="stats" id="stats" style="display:none">
    <span class="stat-label">Time</span>       <span class="stat-value" id="timer">0:00</span>
    <span class="stat-label">Audio chunks</span><span class="stat-value" id="chunks">0 chunks</span>
    <span class="stat-label">Server</span>     <span class="stat-value" id="ws-status">WS: -</span>
    <span class="stat-label">Format</span>     <span class="stat-value" id="format">-</span>
  </div>

  <div class="transcripts" id="transcripts" style="display:none">
    <div class="transcripts-header">Live Transcription</div>
    <div id="transcript-content">
      <div class="transcript-empty">Waiting for audio...</div>
    </div>
  </div>

  <div class="error-msg" id="error-msg" style="display:none"></div>

  <div id="update-status" style="display:none;font-size:10px;color:#10b981;text-align:center;padding:4px;"></div>

  <div class="info">
    System audio (interviewer) + Mic (you).<br>
    No bots · No virtual cables · No browser permissions.
  </div>

  <script src="renderer.js"></script>
</body>
</html>
